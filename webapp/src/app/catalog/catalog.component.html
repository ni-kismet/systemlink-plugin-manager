<app-permission-banner [hasPermission]="hasPermission"></app-permission-banner>

<div class="catalog-toolbar">
  <nimble-select [(ngModel)]="selectedCategory" (ngModelChange)="applyFilters()">
    <nimble-list-option [value]="''">All Categories</nimble-list-option>
    <nimble-list-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</nimble-list-option>
  </nimble-select>

  <nimble-text-field
    placeholder="Search apps…"
    [(ngModel)]="searchTerm"
    (ngModelChange)="applyFilters()">
    <nimble-icon-magnifying-glass slot="start"></nimble-icon-magnifying-glass>
  </nimble-text-field>
</div>

<div *ngIf="loading" class="loading-container">
  <nimble-spinner></nimble-spinner>
  <span>Loading catalog…</span>
</div>

<nimble-banner *ngIf="error" severity="error" [open]="true">
  {{ error }}
</nimble-banner>

<div *ngIf="!loading && !error" class="app-grid">
  <app-card
    *ngFor="let pkg of filteredPackages"
    [pkg]="pkg"
    [installed]="isInstalled(pkg)"
    [upgradeAvailable]="hasUpgrade(pkg)"
    (selected)="openDetail($event)">
  </app-card>

  <div *ngIf="filteredPackages.length === 0" class="empty-state">
    <p>No apps found matching your search criteria.</p>
  </div>
</div>
