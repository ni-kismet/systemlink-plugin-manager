name: Validate Submission

on:
  pull_request:
    paths:
      - 'submissions/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate app submission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect changed submissions
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Find submission directories that were changed in this PR
          # Use env var to avoid script injection via branch name
          DIRS=$(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" \
            | grep '^submissions/' \
            | cut -d'/' -f1-2 \
            | sort -u)
          echo "dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate manifests against schema
        env:
          CHANGED_DIRS: ${{ steps.changed.outputs.dirs }}
        run: |
          pip install jsonschema
          python -c "
          import json, os, sys
          from jsonschema import validate, ValidationError
          from pathlib import Path

          schema = json.loads(Path('app-manifest.schema.json').read_text())
          dirs = os.environ.get('CHANGED_DIRS', '').strip().splitlines()
          errors = []
          for d in dirs:
              d = d.strip()
              if not d:
                  continue
              # Validate directory name contains only safe characters
              if not all(c.isalnum() or c in '-_./=' for c in d):
                  errors.append(f'{d}: directory name contains invalid characters')
                  continue
              manifest_path = Path(d) / 'manifest.json'
              if not manifest_path.is_file():
                  errors.append(f'{d}: missing manifest.json')
                  continue
              try:
                  manifest = json.loads(manifest_path.read_text())
                  validate(instance=manifest, schema=schema)
                  print(f'✓ {d}: schema valid')
              except ValidationError as e:
                  errors.append(f'{d}: {e.message}')
              except json.JSONDecodeError as e:
                  errors.append(f'{d}: invalid JSON: {e}')
          if errors:
              for e in errors:
                  print(f'✗ {e}', file=sys.stderr)
              sys.exit(1)
          print('All manifests valid.')
          "

      - name: Validate .nipkg artifacts
        env:
          CHANGED_DIRS: ${{ steps.changed.outputs.dirs }}
        run: |
          set -euo pipefail
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue

            NIPKG=$(python - "$dir" <<'PY'
          import json
          import sys
          from pathlib import Path

          submission_dir = Path(sys.argv[1])
          manifest = json.loads((submission_dir / 'manifest.json').read_text())
          explicit = manifest.get('nipkgFile')
          if explicit:
              candidate = submission_dir / explicit
              print(candidate if candidate.is_file() else '')
          else:
              matches = sorted(submission_dir.glob('*.nipkg'))
              print(matches[0] if len(matches) == 1 else '')
          PY
            )

            if [ -z "$NIPKG" ] || [ ! -f "$NIPKG" ]; then
              echo "✗ $dir must include exactly one .nipkg artifact (or a valid nipkgFile entry)" >&2
              exit 1
            fi

            if ! file "$NIPKG" | grep -q 'Debian binary package'; then
              echo "✗ $NIPKG is not a Debian-style .nipkg package" >&2
              exit 1
            fi

            MEMBERS=$(ar t "$NIPKG")
            echo "$MEMBERS" | grep -qx 'debian-binary' || { echo "✗ $NIPKG is missing debian-binary" >&2; exit 1; }
            echo "$MEMBERS" | grep -Eq '^control\.tar\.(gz|xz|zst)$' || { echo "✗ $NIPKG is missing control.tar.*" >&2; exit 1; }
            echo "$MEMBERS" | grep -Eq '^data\.tar\.(gz|xz|zst)$' || { echo "✗ $NIPKG is missing data.tar.*" >&2; exit 1; }

            echo "✓ $NIPKG looks like a valid .nipkg archive"
          done <<< "$CHANGED_DIRS"

      - name: Run full validation
        run: python scripts/rebuild_index.py --validate-only

      - name: Check .nipkg size
        env:
          CHANGED_DIRS: ${{ steps.changed.outputs.dirs }}
        run: |
          MAX_SIZE=$((100 * 1024 * 1024))  # 100 MB
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            for nipkg in "$dir"/*.nipkg; do
              [ -f "$nipkg" ] || continue
              SIZE=$(stat -c%s "$nipkg" 2>/dev/null || stat -f%z "$nipkg")
              if [ "$SIZE" -gt "$MAX_SIZE" ]; then
                echo "✗ $nipkg is ${SIZE} bytes (max ${MAX_SIZE})" >&2
                exit 1
              fi
              echo "✓ $nipkg is ${SIZE} bytes (within limit)"
            done
          done

      - name: Check for duplicate package names
        run: |
          python -c "
          import json, sys
          from pathlib import Path

          seen = {}
          for manifest_path in sorted(Path('submissions').glob('*/manifest.json')):
              manifest = json.loads(manifest_path.read_text())
              pkg = manifest.get('package', '')
              d = manifest_path.parent.name
              if pkg in seen:
                  print(f'✗ Duplicate package name \"{pkg}\" in {d} and {seen[pkg]}', file=sys.stderr)
                  sys.exit(1)
              seen[pkg] = d
          print(f'✓ No duplicate package names ({len(seen)} unique)')
          "
