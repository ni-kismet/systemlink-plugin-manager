name: Publish Release

on:
  workflow_dispatch:
    inputs:
      submission:
        description: 'Submission directory name (under submissions/)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Build and release webapp package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Read manifest
        id: manifest
        run: |
          DIR="submissions/${{ inputs.submission }}"
          if [ ! -f "$DIR/manifest.json" ]; then
            echo "✗ No manifest.json found in $DIR" >&2
            exit 1
          fi
          PACKAGE=$(jq -r '.package' "$DIR/manifest.json")
          VERSION=$(jq -r '.version' "$DIR/manifest.json")
          DISPLAY_NAME=$(jq -r '.displayName' "$DIR/manifest.json")
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "display_name=$DISPLAY_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${PACKAGE}-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Build webapp
        run: npm run build
        working-directory: webapp

      - name: Package webapp as .nipkg
        id: nipkg
        run: |
          rm -rf webapp/dist/nipkg
          npx -y @ni-kismet/sl-webapp-nipkg@0.3.0 build \
            --build-dir webapp/dist/webapp/browser \
            --name "${{ steps.manifest.outputs.package }}" \
            --version "${{ steps.manifest.outputs.version }}" \
            --description "$(jq -r '.description' submissions/${{ inputs.submission }}/manifest.json)" \
            --maintainer "$(jq -r '.maintainer' submissions/${{ inputs.submission }}/manifest.json)" \
            --output-dir webapp/dist/nipkg
          NIPKG=$(find webapp/dist/nipkg -maxdepth 1 -name '*.nipkg' | head -1)
          if [ -z "$NIPKG" ]; then
            echo "✗ Packaging did not produce a .nipkg file" >&2
            exit 1
          fi
          echo "path=$NIPKG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$NIPKG")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.manifest.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.manifest.outputs.tag }}" \
              "${{ steps.nipkg.outputs.path }}" \
              --clobber
          else
            gh release create "${{ steps.manifest.outputs.tag }}" \
              "${{ steps.nipkg.outputs.path }}" \
              --title "${{ steps.manifest.outputs.display_name }} v${{ steps.manifest.outputs.version }}" \
              --notes "Release of ${{ steps.manifest.outputs.display_name }} version ${{ steps.manifest.outputs.version }}" \
              --latest=false
          fi

      - name: Trigger index rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run rebuild-index.yml --ref main
