name: Publish Release

on:
  workflow_dispatch:
    inputs:
      submission:
        description: 'Submission directory name (under submissions/)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish submitted package
    runs-on: ubuntu-latest
    env:
      SUBMISSION_NAME: ${{ inputs.submission }}
    steps:
      - uses: actions/checkout@v4

      - name: Read manifest
        id: manifest
        run: |
          DIR="submissions/${SUBMISSION_NAME}"
          if [ ! -f "$DIR/manifest.json" ]; then
            echo "✗ No manifest.json found in $DIR" >&2
            exit 1
          fi
          PACKAGE=$(jq -r '.package' "$DIR/manifest.json")
          VERSION=$(jq -r '.version' "$DIR/manifest.json")
          DISPLAY_NAME=$(jq -r '.displayName' "$DIR/manifest.json")
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "display_name=$DISPLAY_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${PACKAGE}-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Locate release artifact
        id: artifact
        run: |
          DIR="submissions/${SUBMISSION_NAME}"
          EXPLICIT=$(jq -r '.nipkgFile // empty' "$DIR/manifest.json")
          FOUND=""

          if [ -n "$EXPLICIT" ] && [ -f "$DIR/$EXPLICIT" ]; then
            FOUND="$DIR/$EXPLICIT"
          elif [ -z "$EXPLICIT" ]; then
            shopt -s nullglob
            MATCHES=("$DIR"/*.nipkg)
            shopt -u nullglob
            if [ "${#MATCHES[@]}" -eq 1 ]; then
              FOUND="${MATCHES[0]}"
            fi
          fi

          PACKAGE_NAME="${{ steps.manifest.outputs.package }}"
          if [ -n "$FOUND" ]; then
            echo "build_webapp=false" >> "$GITHUB_OUTPUT"
            echo "path=$FOUND" >> "$GITHUB_OUTPUT"
            echo "name=$(basename "$FOUND")" >> "$GITHUB_OUTPUT"
          elif [ "$PACKAGE_NAME" = "systemlink-app-store" ]; then
            echo "build_webapp=true" >> "$GITHUB_OUTPUT"
          else
            echo "✗ No .nipkg artifact found in $DIR. Add one to the submission or set nipkgFile." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        if: steps.artifact.outputs.build_webapp == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        if: steps.artifact.outputs.build_webapp == 'true'
        run: npm ci
        working-directory: webapp

      - name: Build webapp
        if: steps.artifact.outputs.build_webapp == 'true'
        run: npm run build
        working-directory: webapp

      - name: Package SystemLink App Store webapp
        if: steps.artifact.outputs.build_webapp == 'true'
        id: build_nipkg
        run: |
          rm -rf webapp/dist/nipkg
          npx -y @ni-kismet/sl-webapp-nipkg@0.3.0 build \
            --build-dir webapp/dist/webapp/browser \
            --name "${{ steps.manifest.outputs.package }}" \
            --version "${{ steps.manifest.outputs.version }}" \
            --description "$(jq -r '.description' "submissions/${SUBMISSION_NAME}/manifest.json")" \
            --maintainer "$(jq -r '.maintainer' "submissions/${SUBMISSION_NAME}/manifest.json")" \
            --output-dir webapp/dist/nipkg
          NIPKG=$(find webapp/dist/nipkg -maxdepth 1 -name '*.nipkg' | head -1)
          if [ -z "$NIPKG" ]; then
            echo "✗ Packaging did not produce a .nipkg file" >&2
            exit 1
          fi
          echo "path=$NIPKG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$NIPKG")" >> "$GITHUB_OUTPUT"

      - name: Select release artifact
        id: release_artifact
        run: |
          if [ "${{ steps.artifact.outputs.build_webapp }}" = "true" ]; then
            echo "path=${{ steps.build_nipkg.outputs.path }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ steps.build_nipkg.outputs.name }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ steps.artifact.outputs.path }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ steps.artifact.outputs.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.manifest.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.manifest.outputs.tag }}" \
              "${{ steps.release_artifact.outputs.path }}" \
              --clobber
          else
            gh release create "${{ steps.manifest.outputs.tag }}" \
              "${{ steps.release_artifact.outputs.path }}" \
              --title "${{ steps.manifest.outputs.display_name }} v${{ steps.manifest.outputs.version }}" \
              --notes "Release of ${{ steps.manifest.outputs.display_name }} version ${{ steps.manifest.outputs.version }}" \
              --latest=false
          fi

      - name: Trigger index rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run rebuild-index.yml --ref main
