name: Rebuild Index

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: rebuild-index
  cancel-in-progress: false

jobs:
  rebuild:
    name: Rebuild Packages index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild Packages index
        run: python scripts/rebuild_index.py

      - name: Commit updated Packages files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages Packages.gz
          if git diff --cached --quiet; then
            echo "No changes to Packages index."
          else
            git commit -m "chore: rebuild Packages index [skip ci]"
            git push
          fi

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: rebuild
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (index may have been updated)
        run: git pull --ff-only

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          # Landing page and static assets
          cp -r docs/. _site/ 2>/dev/null || true
          # Feed index files served at the same root URL
          cp Packages _site/ 2>/dev/null || true
          cp Packages.gz _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
