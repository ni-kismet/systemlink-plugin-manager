name: Publish Plugin Manager Webapp

on:
  push:
    branches: [main]
    paths:
      - 'change/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  publish:
    name: Build and publish webapp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Bump version (beachball)
        run: |
          npx beachball bump --no-push
          echo "Bumped. New version: $(jq -r '.version' webapp/package.json)"

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' webapp/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=systemlink-plugin-manager-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Sync version to manifest, nipkg config, and models
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          jq --arg v "$VERSION" '.version = $v' \
            submissions/systemlink-plugin-manager/manifest.json > tmp.json \
            && mv tmp.json submissions/systemlink-plugin-manager/manifest.json

          jq --arg v "$VERSION" '.version = $v' \
            webapp/nipkg.config.json > tmp.json \
            && mv tmp.json webapp/nipkg.config.json

          sed -i "s/export const PLUGIN_MANAGER_VERSION = '.*';/export const PLUGIN_MANAGER_VERSION = '${VERSION}';/" \
            webapp/src/app/models/plugin-manager.models.ts

      - name: Commit version bump and sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webapp/package.json webapp/CHANGELOG.md \
                  submissions/systemlink-plugin-manager/manifest.json webapp/nipkg.config.json \
                  webapp/src/app/models/plugin-manager.models.ts \
                  change/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: bump plugin manager to ${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Build webapp
        run: npm run build
        working-directory: webapp

      - name: Package nipkg
        id: package
        run: |
          rm -rf dist/nipkg
          npx -y @ni-kismet/sl-webapp-nipkg@1.0.0 build \
            --config nipkg.config.json \
            --output-dir dist/nipkg
          NIPKG=$(find dist/nipkg -maxdepth 1 -name '*.nipkg' | head -1)
          if [ -z "$NIPKG" ]; then
            echo "✗ Packaging did not produce a .nipkg file" >&2
            exit 1
          fi
          # Output paths relative to repo root for subsequent steps
          echo "path=webapp/$NIPKG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$NIPKG")" >> "$GITHUB_OUTPUT"
        working-directory: webapp

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG=$(npx beachball changelog --package systemlink-plugin-manager 2>/dev/null || echo "Release of Plugin Manager for SystemLink version ${VERSION}")
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "${{ steps.package.outputs.path }}" \
              --clobber
          else
            gh release create "$TAG" \
              "${{ steps.package.outputs.path }}" \
              --title "Plugin Manager for SystemLink v${VERSION}" \
              --notes "$CHANGELOG" \
              --latest
          fi

      - name: Trigger index rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run rebuild-index.yml --ref main
