name: Publish App Store Webapp

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'

permissions:
  contents: write
  actions: write

jobs:
  publish:
    name: Build and publish webapp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' webapp/package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "✗ Could not read version from webapp/package.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=systemlink-app-store-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Sync version to manifest and nipkg config
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          jq --arg v "$VERSION" '.version = $v' \
            submissions/systemlink-app-store/manifest.json > tmp.json \
            && mv tmp.json submissions/systemlink-app-store/manifest.json

          jq --arg v "$VERSION" '.version = $v' \
            webapp/nipkg.config.json > tmp.json \
            && mv tmp.json webapp/nipkg.config.json

      - name: Commit version sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add submissions/systemlink-app-store/manifest.json webapp/nipkg.config.json
          if git diff --cached --quiet; then
            echo "Versions already in sync."
          else
            git commit -m "chore: sync app store version to ${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webapp

      - name: Build webapp
        run: npm run build
        working-directory: webapp

      - name: Package nipkg
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf webapp/dist/nipkg
          npx -y @ni-kismet/sl-webapp-nipkg@0.3.0 build \
            --build-dir webapp/dist/webapp/browser \
            --name systemlink-app-store \
            --version "$VERSION" \
            --description "$(jq -r '.description' submissions/systemlink-app-store/manifest.json)" \
            --maintainer "$(jq -r '.maintainer' submissions/systemlink-app-store/manifest.json)" \
            --output-dir webapp/dist/nipkg
          NIPKG=$(find webapp/dist/nipkg -maxdepth 1 -name '*.nipkg' | head -1)
          if [ -z "$NIPKG" ]; then
            echo "✗ Packaging did not produce a .nipkg file" >&2
            exit 1
          fi
          echo "path=$NIPKG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$NIPKG")" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "${{ steps.package.outputs.path }}" \
              --clobber
          else
            gh release create "$TAG" \
              "${{ steps.package.outputs.path }}" \
              --title "SystemLink App Store v${VERSION}" \
              --notes "Release of SystemLink App Store version ${VERSION}" \
              --latest
          fi

      - name: Trigger index rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run rebuild-index.yml --ref main
